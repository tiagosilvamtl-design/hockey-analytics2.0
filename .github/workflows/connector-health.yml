name: connector-health

# Nightly check that public APIs we depend on haven't schema-drifted on us.
# On failure, opens an Issue tagged `connector-drift` so the connector's codeowner triages.

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install connectors
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/lemieux-core
          pip install -e packages/lemieux-glossary
          pip install -e packages/lemieux-connectors
          pip install pytest pandera

      - name: NHL API smoke
        run: |
          python -c "
          from lemieux.connectors.nhl_api import NhlApiClient
          c = NhlApiClient()
          df = c.refresh(kind='schedule', date='$(date -u +%Y-%m-%d)')
          assert len(df.columns) >= 5, f'NHL API schedule schema changed: {list(df.columns)}'
          print('NHL API OK:', len(df), 'games today')
          "

      - name: Report drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `connector-drift: ${context.runId}`,
              body: `A scheduled connector-health run failed. See https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis usually means an upstream API changed its schema. The owner of the failing connector should investigate and either patch or open a tracking issue within 2 weeks.`,
              labels: ['connector-drift', 'bug']
            })
