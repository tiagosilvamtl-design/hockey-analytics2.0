# Notable narrative anchors (manual)
narrative_anchors:
  gallagher_first_appearance:
    significance: |
      Gallagher's first appearance of the series. He was the focus of yesterday's
      Lemieux pre-game brief — projected onto L3 with Anderson + Danault, with
      a warrior-cohort archetype lift study suggesting his comp pool over-delivers
      in playoffs. He scored 3:00 into the game on his first shift sequence.
      TOI of 6:48 is well below the projected 10-min L3 slot, suggesting either
      a tight 4-line rotation, an in-game adjustment, or an injury management
      approach. The goal stands regardless.
  dach_line_response:
    significance: |
      The "demoted to L4" Dach line in Marinaro's projection (Bolduc-Dach-Texier)
      produced BOTH MTL 5v5 goals after Gallagher's opener: Dach scored at P2
      7:00 (Bolduc primary assist) and Texier scored the GW at P3 1:06 (Hutson
      primary, Suzuki secondary). All three trio members combined for 2G + 1A
      in 12-13 min of TOI — exactly the line that yesterday's brief said the
      iso math made the demotion almost cost-free.
  dobes_wall:
    significance: |
      Dobeš stopped 38 of 40 shots (.950 SV%) on a night TBL outshot MTL 40-24.
      Vasilevskiy on the other end was .875 (21/24). The PBP-direct goalie SV%
      gap is the cleanest cause of the win.
  tbl_kucherov_blank:
    significance: |
      Kucherov 0 points on 8 shots in 21:44. Highest individual-shot game of
      the series with no offensive output. The Dobeš save-streak is the inverse
      of his shot-volume night.
