# Curated source whitelist for `research-game`. Edit this to add or retire sources.
# Each entry is searched separately (one WebSearch call per domain) so the search index
# isn't dominated by a single high-volume site.

sources:
  - id: la_presse
    name: La Presse
    url: https://www.lapresse.ca/
    domains: [lapresse.ca]
    language: fr
    region: QC
    register: analytical
    notable_writers: [Mathias Brunet, Simon-Olivier Lorange, Guillaume Lefrançois, Jean-François Tremblay, Richard Labbé]
    paywall: soft  # most articles accessible; some chroniques limited
    status: active

  - id: rds
