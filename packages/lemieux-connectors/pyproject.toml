[project]
name = "lemieux-connectors"
version = "0.1.0"
description = "Lemieux data connectors — plugin-style adapters to NHL.com, Natural Stat Trick, MoneyPuck, PWHL, and more"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.2",
    "requests>=2.32",
    "tenacity>=8.5",
    "python-dotenv>=1.0",
    "lxml>=5.2",
    "beautifulsoup4>=4.12",
    "html5lib>=1.1",
    "pyyaml>=6.0",
    "truststore>=0.9",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "vcrpy>=6.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[tool.setuptools.package-data]
"lemieux.connectors" = ["*.yaml"]
