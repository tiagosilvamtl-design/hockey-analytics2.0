[project]
name = "lemieux-core"
version = "0.1.0"
description = "Lemieux core analytics primitives: swap engine, isolated impact, pooled baselines, CIs"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Xavier Beauchamp-Tremblay" }]
dependencies = [
    "pandas>=2.2",
    "numpy>=1.26",
    "scipy>=1.13",
]

[project.optional-dependencies]
dev = ["pytest>=8.3"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
