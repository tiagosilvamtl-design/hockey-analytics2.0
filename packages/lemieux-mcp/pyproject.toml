[project]
name = "lemieux-mcp"
version = "0.1.0"
description = "Lemieux FastMCP server — exposes hockey analytics tools and resources to any MCP client"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "pandas>=2.2",
    "pyyaml>=6.0",
    "lemieux-core",
    "lemieux-glossary",
    "lemieux-connectors",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[project.scripts]
lemieux-mcp = "lemieux.mcp.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
